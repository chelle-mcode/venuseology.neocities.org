<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
            line-height: 1.6;
            color: #333;
        }

        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }

        nav {
            background: #444;
            padding: 0.5rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
            display: inline-block;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        section {
            margin: 2rem 0;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <title>All About Elle!</title>
    <style>
        body {
            background-color: cornsilk;
            margin: auto;
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
            font-weight: 400;
            font-size: 10px;
        }
    </style>
    <script language="JavaScript">
        var today = new Date();
        var date = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
        var msg = "Hello Traveler. Thank you for venturing out into this little corner of me (Elle!) on " + date + ". I hope you enjoy your stay!";
        document.write(msg);

    </script>
    <header>
        <h1>My Project</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="container">
        <section id="home">
            <h2>Welcome</h2>
            <p>This is your project website homepage.</p>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>Tell your audience about your project here.</p>
        </section>

        <section id="projects">
            <h2>Projects</h2>
            <p>Showcase your work here.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>Get in touch with your audience.</p>
        </section>
    </div>

    <footer>
        <p>&copy; 2024 My Project. All rights reserved.</p>
    </footer>
</body>

</html>
